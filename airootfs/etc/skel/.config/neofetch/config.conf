image_backend="ascii"
image_source="/usr/share/nine-os/ascii/nine-os-neofetch.txt"
ascii_colors=(1 7 7 7 7 7)
ascii_bold=true
colors=(1 7 7 7 7 7)
bold=true

print_info() {
    prin "${cl1}  NineOS 1.0 (Stone River)"
    prin ""
    info "OS"       distro
    info "Kernel"   kernel
    info "Uptime"   uptime
    info "Shell"    shell
    info "DE"       de
    info "WM"       wm
    info "Theme"    theme
    info "Icons"    icons
    info "Terminal" term
    info "CPU"      cpu
    info "GPU"      gpu
    info "Memory"   memory
    prin ""
    prin "$(color 1)███$(color 2)███$(color 3)███$(color 4)███$(color 5)███$(color 6)███$(color 7)███$(color 8)███"
}

separator=" "
title_fqdn=false
